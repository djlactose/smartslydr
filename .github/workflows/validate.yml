name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
      - uses: "actions/checkout@v4"
      - uses: "home-assistant/actions/hassfest@master"

  pytest:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          # aiodns has type annotations that reference pycares
          # attributes pinned out of reach by HA's transitive deps -
          # the result is a module-load AttributeError before any
          # test runs. aiohttp.resolver wraps `import aiodns` in
          # try/except and falls back to the default resolver, so
          # uninstalling here is safe; our tests don't do real DNS.
          pip uninstall -y aiodns pycares
      - name: Run pytest
        run: pytest tests/ -v
