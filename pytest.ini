[pytest]
# auto mode lets pytest-asyncio properly handle the chain where
# pytest-homeassistant-custom-component's sync `enable_custom_integrations`
# fixture depends on its own async `hass` fixture. Strict mode hands the
# sync consumer the un-awaited async generator and crashes with
# "AttributeError: 'async_generator' object has no attribute 'data'".
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
